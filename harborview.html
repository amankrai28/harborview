<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harbor View — Pier 4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<style>
  :root{
    --ink:#0A1A24; --slate:#102733; --slate2:#0c2030; --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.14);
    --text:#E7EEF2; --muted:#9DB2BF; --dim:#62798A;
    --foam:#46C2B0; --amber:#E8A93C; --signal:#4FB477; --info:#5AA7E6; --danger:#E0795F; --ship:#CBD8E0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--ink);color:var(--text);font-family:Inter,system-ui,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
  .mono{font-family:"IBM Plex Mono",ui-monospace,Menlo,monospace;font-feature-settings:"tnum" 1;}
  a{color:var(--foam)}
  #map{position:absolute;inset:0}

  .topbar{position:absolute;z-index:5;top:12px;left:12px;right:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;pointer-events:none}
  .brand{display:flex;align-items:center;gap:10px;background:rgba(12,32,48,.88);border:1px solid var(--line);border-radius:12px;padding:7px 12px;pointer-events:auto}
  .brand svg{width:26px;height:26px;display:block}
  .ttl{font-size:16px;font-weight:600;letter-spacing:.2px}
  .sub2{font-size:11.5px;color:var(--muted);margin-top:1px}
  .status{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);background:rgba(12,32,48,.88);border:1px solid var(--line);padding:7px 12px;border-radius:999px;pointer-events:auto}
  .status .dot{width:9px;height:9px;border-radius:50%;background:var(--dim)}
  .status.live .dot{background:var(--signal);box-shadow:0 0 0 0 rgba(79,180,119,.6);animation:pulse 1.8s infinite}
  .status.demo .dot{background:var(--amber)}
  .status.err .dot{background:var(--danger)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(79,180,119,.5)}70%{box-shadow:0 0 0 7px rgba(79,180,119,0)}100%{box-shadow:0 0 0 0 rgba(79,180,119,0)}}

  .banner{display:none;position:absolute;z-index:6;top:60px;left:12px;max-width:360px;align-items:flex-start;gap:10px;background:rgba(20,30,20,.95);border:1px solid rgba(232,169,60,.35);color:#f0d49a;border-radius:12px;padding:11px 14px;font-size:12.5px;line-height:1.5}
  .banner.show{display:flex}
  .banner b{color:#f6e3b8;font-weight:600}

  .loc{font-size:11px;color:#cfe0ea;background:rgba(10,26,36,.6);padding:1px 6px;border-radius:5px;white-space:nowrap;pointer-events:none;border:1px solid rgba(255,255,255,.07);transform:translateX(5px)}
  .loc.you{color:#06222a;background:var(--foam);font-weight:600;border-color:var(--foam)}
  .shipm svg{display:block}

  .detail{display:none;position:absolute;z-index:6;left:12px;bottom:12px;width:330px;max-width:calc(100vw - 24px);max-height:calc(100vh - 96px);overflow:auto;background:rgba(12,32,48,.96);border:1px solid var(--line2);border-radius:14px;padding:15px 16px}
  .detail.show{display:block}
  .dclose{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--muted);font-size:20px;line-height:1;cursor:pointer;padding:2px 6px}
  .dclose:hover{color:var(--text)}
  .d-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin:0 26px 12px 0}
  .d-name{font-size:17px;font-weight:600;line-height:1.2}
  .d-type{font-size:12.5px;color:var(--muted);margin-top:2px}
  .chip{font-size:12px;color:var(--text);background:var(--slate2);border:1px solid var(--line);padding:3px 10px;border-radius:8px;white-space:nowrap}
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:8px}
  .tile{background:var(--slate2);border-radius:9px;padding:9px 11px}
  .tile .v{font-size:18px;font-weight:500}
  .tile .v .u{font-size:12px;color:var(--muted)}
  .tile .k{font-size:11px;color:var(--muted);margin-top:1px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 0;border-top:1px solid var(--line);font-size:13px}
  .row .lab{color:var(--muted)}
  .row .val{display:flex;align-items:center;gap:8px;text-align:right}
  .bdg{font-size:10.5px;font-weight:500;padding:1px 7px;border-radius:7px;white-space:nowrap}
  .b-ais{background:rgba(79,180,119,.16);color:#8fd9ad}
  .b-mid{background:rgba(90,167,230,.16);color:#9ccbf0}
  .b-crew{background:rgba(232,169,60,.16);color:#f0d49a}
  .profile{display:inline-flex;align-items:center;gap:6px;margin-top:13px;font-size:13px;color:var(--foam);text-decoration:none;border:1px solid var(--line2);padding:8px 13px;border-radius:9px}
  .profile:hover{background:var(--slate2)}
  .prov{display:flex;gap:14px;flex-wrap:wrap;margin-top:11px;font-size:11px;color:var(--dim)}

  .maplibregl-popup-content{background:#0c2030;color:#E7EEF2;border:1px solid rgba(255,255,255,.16);border-radius:9px;font-size:12.5px}
  @media (max-width:520px){ .detail{width:auto;left:12px;right:12px} .sub2{display:none} }
  @media (prefers-reduced-motion:reduce){ .status.live .dot{animation:none} }
</style>
</head>
<body>
<div id="map"></div>

<div class="topbar">
  <div class="brand">
    <svg viewBox="0 0 48 48" aria-hidden="true"><circle cx="24" cy="24" r="20" fill="none" stroke="#46C2B0" stroke-width="2"/><path d="M24 6 L28 24 L24 42 L20 24 Z" fill="#46C2B0"/><circle cx="24" cy="24" r="2.6" fill="#0A1A24" stroke="#46C2B0" stroke-width="1.6"/></svg>
    <div><div class="ttl">Harbor View</div><div class="sub2">Pier 4 · Boston Harbor · live AIS</div></div>
  </div>
  <div class="status" id="status"><span class="dot"></span><span id="stext">Connecting…</span></div>
</div>

<div class="banner" id="banner"></div>
<div class="detail" id="detail"></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
(function(){
  /* ---------- config ---------- */
  var API_KEY = "";                                    // no secret in the client
  var OBS = { lat: 42.3535, lon: -71.0420 };           // Pier 4 window (for range/bearing readout)
  var BBOX = [[[42.45, -70.86], [42.27, -71.13]]];     // Boston Harbor box (proxy mode subscribe)
  var DEPLOY = "https://harborview-tau.vercel.app";    // for local QC: file:// polls the live endpoint
  var WINDOW_BEARING = 30;                             // map rotation: land off Pier 4 points "up"
  var isLocalProxy = (location.host === "localhost:8080" || location.host === "127.0.0.1:8080");
  var isHttp = (location.protocol === "http:" || location.protocol === "https:");
  var MODE = isLocalProxy ? "proxy" : "poll";          // poll covers deployed + file:// (QC); demo via fail()
  var ENDPOINT = "ws://" + location.host;              // proxy mode only
  var POLL_URL = isHttp ? "/api/ships" : (DEPLOY + "/api/ships");
  var POLL_MS = 3000;

  /* ---------- state ---------- */
  var vessels = new Map(), sel = null, live = false, demo = false, msgs = 0;
  var shipMarkers = new Map(), map = null, mapReady = false;
  var TORAD = Math.PI/180;

  /* ---------- geo (range + bearing from the Pier 4 observer) ---------- */
  function geo(lat, lon){
    var dLat=(lat-OBS.lat)*TORAD, dLon=(lon-OBS.lon)*TORAD, la1=OBS.lat*TORAD, la2=lat*TORAD;
    var a=Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLon/2)**2;
    var range=2*6371*Math.asin(Math.min(1,Math.sqrt(a)));
    var y=Math.sin(dLon)*Math.cos(la2), x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dLon);
    var brg=(Math.atan2(y,x)/TORAD+360)%360;
    return {range:range, bearing:brg};
  }
  function destPoint(brg, range){ // inverse — demo placement
    var d=range/6371, b=brg*TORAD, la1=OBS.lat*TORAD, lo1=OBS.lon*TORAD;
    var la2=Math.asin(Math.sin(la1)*Math.cos(d)+Math.cos(la1)*Math.sin(d)*Math.cos(b));
    var lo2=lo1+Math.atan2(Math.sin(b)*Math.sin(d)*Math.cos(la1), Math.cos(d)-Math.sin(la1)*Math.sin(la2));
    return {lat:la2/TORAD, lon:lo2/TORAD};
  }
  var pad = function(x){return String(Math.round(((x%360)+360)%360)).padStart(3,"0");};
  var clamp = function(x,a,b){return Math.max(a,Math.min(b,x));};
  function fwd(lat, lon, brg, km){ // destination point from an arbitrary origin (dead-reckoning)
    var d=km/6371, b=brg*TORAD, la1=lat*TORAD, lo1=lon*TORAD;
    var la2=Math.asin(Math.sin(la1)*Math.cos(d)+Math.cos(la1)*Math.sin(d)*Math.cos(b));
    var lo2=lo1+Math.atan2(Math.sin(b)*Math.sin(d)*Math.cos(la1), Math.cos(d)-Math.sin(la1)*Math.sin(la2));
    return {lat:la2/TORAD, lon:lo2/TORAD};
  }
  var MIN_PX=12, MAXPROJ_MS=60*1000;  // ship-icon size floor (px); only dead-reckon fixes < 60s old

  /* ---------- AIS lookups ---------- */
  var MID = {"201":"Albania","205":"Belgium","209":"Cyprus","210":"Cyprus","211":"Germany","212":"Cyprus","218":"Germany","219":"Denmark","220":"Denmark","226":"France","227":"France","228":"France","229":"Malta","230":"Finland","231":"Faroe Is.","232":"United Kingdom","233":"United Kingdom","234":"United Kingdom","235":"United Kingdom","236":"Gibraltar","237":"Greece","238":"Croatia","239":"Greece","240":"Greece","241":"Greece","244":"Netherlands","245":"Netherlands","246":"Netherlands","247":"Italy","248":"Malta","249":"Malta","256":"Malta","257":"Norway","258":"Norway","259":"Norway","265":"Sweden","266":"Sweden","269":"Switzerland","271":"Türkiye","303":"USA (Alaska)","304":"Antigua & Barbuda","305":"Antigua & Barbuda","306":"Curaçao","308":"Bahamas","309":"Bahamas","311":"Bahamas","316":"Canada","319":"Cayman Is.","338":"USA","341":"St Kitts & Nevis","351":"Panama","352":"Panama","353":"Panama","354":"Panama","355":"Panama","356":"Panama","357":"Panama","366":"USA","367":"USA","368":"USA","369":"USA","370":"Panama","371":"Panama","372":"Panama","373":"Panama","374":"Panama","375":"St Vincent","376":"St Vincent","377":"St Vincent","412":"China","413":"China","416":"Taiwan","431":"Japan","432":"Japan","440":"South Korea","441":"South Korea","477":"Hong Kong","525":"Indonesia","533":"Malaysia","538":"Marshall Is.","563":"Singapore","564":"Singapore","565":"Singapore","566":"Singapore","574":"Vietnam","636":"Liberia","637":"Liberia","657":"Nigeria","710":"Brazil","725":"Chile"};
  function flag(mmsi){ var m=String(mmsi||"").slice(0,3); return MID[m] || ("MID "+(m||"—")); }
  function typeInfo(code, len){
    var c = +code || 0;
    if(c>=70 && c<=79) return {label:"Cargo", glyph:"cargo"};
    if(c>=80 && c<=89) return {label:"Tanker", glyph:"tanker"};
    if(c>=60 && c<=69) return {label:"Passenger", glyph:(len && len>120)?"cruise":"small"};
    if(c===31||c===32||c===52) return {label:"Tug / towing", glyph:"tug"};
    if(c===50) return {label:"Pilot vessel", glyph:"small"};
    if(c===51) return {label:"Search & rescue", glyph:"small"};
    if(c===36) return {label:"Sailing", glyph:"sail"};
    if(c===37) return {label:"Pleasure craft", glyph:"small"};
    if(c===30) return {label:"Fishing", glyph:"small"};
    return {label:"Vessel", glyph:"small"};
  }
  function navText(n){
    var m={0:"Under way",1:"At anchor",2:"Not under command",3:"Restricted manoeuvrability",4:"Constrained by draught",5:"Moored",6:"Aground",7:"Fishing",8:"Under way sailing",15:""};
    return (n in m)?m[n]:"";
  }
  function formatEta(e){
    if(!e || !e.Month || !e.Day) return null;
    var p2=function(n){return String(n).padStart(2,"0");};
    var hm=(e.Hour!=null && e.Hour<24 && e.Minute!=null && e.Minute<60)?" "+p2(e.Hour)+":"+p2(e.Minute):"";
    return p2(e.Month)+"-"+p2(e.Day)+hm;
  }

  /* ---------- top-down ship silhouettes (bow up; MapLibre rotates by heading) ---------- */
  var COLOR={cargo:"#E8A93C",tanker:"#E0795F",cruise:"#5AA7E6",tug:"#4FB477",sail:"#CBD8E0",small:"#46C2B0"};
  function shipSVG(glyph,len,beam,Lpx,on){
    len=len||30; beam=beam||Math.max(4,len*0.16);
    var W=Math.max(6,Lpx*(beam/len)), c=on?"#E8A93C":(COLOR[glyph]||"#CBD8E0"),
        stroke=on?"#ffe2a6":"#06151d", sw=on?1.6:1, d="#0c2030", i;
    var hull='<path d="M0,'+Lpx+' L0,'+(0.3*Lpx)+' L'+(W/2)+',0 L'+W+','+(0.3*Lpx)+' L'+W+','+Lpx+' Z" fill="'+c+'" stroke="'+stroke+'" stroke-width="'+sw+'"/>';
    var deck='';
    if(glyph==='cargo'){
      var rows=clamp(Math.round(Lpx/9),3,6), hgt=(0.5*Lpx/rows);
      for(i=0;i<rows;i++){ deck+='<rect x="'+(0.2*W)+'" y="'+((0.34+i*0.55/rows)*Lpx).toFixed(1)+'" width="'+(0.6*W)+'" height="'+hgt.toFixed(1)+'" fill="'+d+'" opacity="0.55"/>'; }
    } else if(glyph==='tanker'){
      deck='<line x1="'+(W/2)+'" y1="'+(0.3*Lpx)+'" x2="'+(W/2)+'" y2="'+(0.9*Lpx)+'" stroke="'+d+'" stroke-width="'+(0.14*W)+'" opacity="0.5"/><circle cx="'+(W/2)+'" cy="'+(0.74*Lpx)+'" r="'+(0.18*W)+'" fill="'+d+'" opacity="0.6"/>';
    } else if(glyph==='cruise'){
      deck='<rect x="'+(0.16*W)+'" y="'+(0.16*Lpx)+'" width="'+(0.68*W)+'" height="'+(0.68*Lpx)+'" rx="2" fill="#eaf0f4" opacity="0.85"/><rect x="'+(0.16*W)+'" y="'+(0.42*Lpx)+'" width="'+(0.68*W)+'" height="1.4" fill="'+d+'"/><rect x="'+(0.16*W)+'" y="'+(0.6*Lpx)+'" width="'+(0.68*W)+'" height="1.4" fill="'+d+'"/>';
    } else if(glyph==='tug'){
      deck='<rect x="'+(0.22*W)+'" y="'+(0.3*Lpx)+'" width="'+(0.56*W)+'" height="'+(0.34*Lpx)+'" rx="1.5" fill="'+d+'" opacity="0.7"/>';
    } else if(glyph==='sail'){
      deck='<circle cx="'+(W/2)+'" cy="'+(0.5*Lpx)+'" r="'+Math.max(1.6,0.16*W)+'" fill="'+d+'"/>';
    } else {
      deck='<rect x="'+(0.28*W)+'" y="'+(0.4*Lpx)+'" width="'+(0.44*W)+'" height="'+(0.28*Lpx)+'" fill="'+d+'" opacity="0.6"/>';
    }
    var halo=on?'<circle cx="'+(W/2)+'" cy="'+(Lpx/2)+'" r="'+(Math.max(W,Lpx)*0.62).toFixed(1)+'" fill="rgba(232,169,60,0.16)"/>':'';
    return '<svg width="'+W+'" height="'+Lpx+'" viewBox="0 0 '+W+' '+Lpx+'" style="overflow:visible;filter:drop-shadow(0 1px 2px rgba(0,0,0,.75))">'+halo+hull+deck+'</svg>';
  }

  /* ---------- map ---------- */
  var LABELS=[
    {name:"Pier 4 (you)",lat:42.3535,lon:-71.0420,you:1},
    {name:"Fan Pier",lat:42.3525,lon:-71.0445},{name:"Seaport",lat:42.3505,lon:-71.0440},
    {name:"Boston Fish Pier",lat:42.3490,lon:-71.0360},{name:"Black Falcon Cruise",lat:42.3447,lon:-71.0300},
    {name:"Conley Terminal",lat:42.3360,lon:-71.0205},{name:"Castle Island",lat:42.3380,lon:-71.0120},
    {name:"Long Wharf",lat:42.3596,lon:-71.0492},{name:"North End",lat:42.3650,lon:-71.0545},
    {name:"Charlestown Navy Yard",lat:42.3740,lon:-71.0540},{name:"East Boston",lat:42.3700,lon:-71.0390},
    {name:"Jeffries Point",lat:42.3622,lon:-71.0335},{name:"Logan Airport",lat:42.3656,lon:-71.0096}
  ];
  function initMap(){
    map=new maplibregl.Map({container:"map",style:"https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
      center:[-71.028,42.356], zoom:13, bearing:WINDOW_BEARING, pitch:0});
    map.addControl(new maplibregl.NavigationControl({showCompass:true,visualizePitch:false}),"top-right");
    map.on("zoomend", render);  // re-size hulls to scale on zoom
    map.on("load",function(){
      try{ map.setPaintProperty("background","background-color","#0f1d27"); }catch(e){}
      (map.getStyle().layers||[]).forEach(function(l){
        try{
          if(l.type==="fill" && /water/i.test(l.id)) map.setPaintProperty(l.id,"fill-color","#1b5e7a");
          if(l.type==="line" && /water/i.test(l.id)) map.setPaintProperty(l.id,"line-color","#1b5e7a");
        }catch(e){}
      });
      LABELS.forEach(function(p){
        var el=document.createElement("div"); el.className="loc"+(p.you?" you":""); el.textContent=p.name;
        new maplibregl.Marker({element:el,anchor:"left"}).setLngLat([p.lon,p.lat]).addTo(map);
      });
      // dead-reckoning overlay: dashed line from last AIS fix → projected position, + a dot at the fix
      map.addSource("proj",{type:"geojson",data:{type:"FeatureCollection",features:[]}});
      map.addLayer({id:"proj-line",type:"line",source:"proj",filter:["==","$type","LineString"],
        paint:{"line-color":"#9DB2BF","line-width":1.3,"line-opacity":0.6,"line-dasharray":[2,2]}});
      map.addLayer({id:"proj-fix",type:"circle",source:"proj",filter:["==","$type","Point"],
        paint:{"circle-radius":3,"circle-color":"#9DB2BF","circle-opacity":0.85,"circle-stroke-color":"#06151d","circle-stroke-width":1}});
      mapReady=true; render();
    });
  }
  function ensureMarker(v){
    var m=shipMarkers.get(v.mmsi);
    if(!m){
      var el=document.createElement("div"); el.className="shipm"; el.style.cursor="pointer";
      el.addEventListener("click",function(e){ e.stopPropagation(); select(v.mmsi); });
      var marker=new maplibregl.Marker({element:el,rotationAlignment:"map",anchor:"center"}).setLngLat([v.lon,v.lat]).addTo(map);
      m={marker:marker, el:el, key:null}; shipMarkers.set(v.mmsi,m);
    }
    return m;
  }

  /* ---------- render ---------- */
  function metresPerPixel(lat){ return 40075016.686*Math.cos(lat*TORAD)/(512*Math.pow(2, map.getZoom())); }
  function render(){
    var now=Date.now(), tot=0;
    if(!mapReady || !map){ renderDetail(now); return; }
    var seen=new Set(), feats=[], mpp=metresPerPixel(OBS.lat);
    vessels.forEach(function(v){
      if(!v.demo && now - v.t > 12*60*1000){ vessels.delete(v.mmsi); var mm=shipMarkers.get(v.mmsi); if(mm){mm.marker.remove();shipMarkers.delete(v.mmsi);} return; }
      if(v.lat==null || v.lon==null) return;
      tot++; seen.add(v.mmsi);
      var on=v.mmsi===sel, course=(v.course!=null ? v.course : v.heading);
      // dead-reckon moving ships to an estimated "now" position; mark it for the detail panel
      var ageSec=(now-v.t)/1000, plat=v.lat, plon=v.lon; v._est=0;
      if(!v.demo && v.sog!=null && v.sog>1 && course!=null && v.nav!==1 && v.nav!==5 && (now-v.t)<MAXPROJ_MS){
        var p=fwd(v.lat, v.lon, course, v.sog*1.852*(ageSec/3600)); plat=p.lat; plon=p.lon; v._est=Math.round(ageSec);
        feats.push({type:"Feature",geometry:{type:"LineString",coordinates:[[v.lon,v.lat],[plon,plat]]}});
        feats.push({type:"Feature",geometry:{type:"Point",coordinates:[v.lon,v.lat]}});
      }
      var m=ensureMarker(v);
      m.marker.setLngLat([plon, plat]);
      m.marker.setRotation(v.heading!=null ? v.heading : (course!=null ? course : 0));
      var Lpx=clamp((v.len||30)/mpp, MIN_PX, 400), key=v.glyph+"|"+Math.round(Lpx)+"|"+(on?1:0)+"|"+Math.round(v.beam||0);
      if(m.key!==key){ m.el.innerHTML=shipSVG(v.glyph, v.len, v.beam, Lpx, on); m.key=key; }
    });
    shipMarkers.forEach(function(m,mmsi){ if(!seen.has(mmsi)){ m.marker.remove(); shipMarkers.delete(mmsi);} });
    var src=map.getSource("proj"); if(src) src.setData({type:"FeatureCollection",features:feats});
    setStatus(tot);
    renderDetail(now);
  }

  function renderDetail(now){
    var el=document.getElementById("detail");
    if(sel===null || !vessels.has(sel)){ el.className="detail"; el.innerHTML=""; return; }
    var v=vessels.get(sel);
    var hd = (v.heading!=null) ? pad(v.heading)+"°" : (v.course!=null ? pad(v.course)+"° <span style='color:var(--dim)'>(course)</span>" : "—");
    var age = v.demo ? "demo" : Math.max(0, Math.round((now - v.t)/1000)) + "s ago";
    var dest = v.dest ? v.dest : "<span style='color:var(--dim)'>not transmitted</span>";
    var rows = ""
      + row("Flag", flag(v.mmsi) + ' <span class="bdg b-mid">MMSI</span>')
      + row("Destination", dest + ' <span class="bdg b-crew">crew</span>')
      + row("ETA", (v.eta ? v.eta+' <span class="bdg b-crew">crew</span>' : "—"))
      + row("Beam", (v.beam? v.beam+" m":"—"))
      + row("Draught", (v.draught? v.draught.toFixed(1)+" m":"—"))
      + row("IMO", (v.imo? v.imo : "—"))
      + row("Call sign", (v.cs? v.cs : "—"))
      + row("Position", v.lat.toFixed(4)+"°, "+v.lon.toFixed(4)+"° <span class='bdg b-ais'>AIS</span>")
      + row("Range / bearing", (v.range!=null?v.range.toFixed(1):"–")+" km · "+pad(v.bearing)+"° <span class='bdg b-ais'>AIS</span>")
      + row("Last report", age)
      + (v._est ? row("Shown position", '<span style="color:var(--amber)">estimated · projected ~'+v._est+'s</span>') : "");
    var prof = v.demo ? "" :
      '<a class="profile" target="_blank" rel="noopener" href="https://www.marinetraffic.com/en/ais/details/ships/mmsi:'+v.mmsi+'">Owner, age &amp; photo — full profile <span aria-hidden="true">↗</span></a>';
    el.className="detail show";
    el.innerHTML =
      '<button class="dclose" aria-label="Close">×</button>'
      +'<div class="d-head"><div><div class="d-name">'+(v.name||("MMSI "+v.mmsi))+'</div><div class="d-type">'+v.cat+(navText(v.nav)?" · "+navText(v.nav):"")+'</div></div><span class="chip">'+flag(v.mmsi)+'</span></div>'
      +'<div class="tiles"><div class="tile"><div class="v mono">'+(v.sog!=null?v.sog.toFixed(1):"–")+'</div><div class="k">knots</div></div>'
      +'<div class="tile"><div class="v mono">'+hd+'</div><div class="k">heading</div></div>'
      +'<div class="tile"><div class="v mono">'+(v.len?v.len:"–")+'<span class="u"> m</span></div><div class="k">length</div></div></div>'
      +'<div>'+rows+'</div>'+prof
      +'<div class="prov"><span><span class="bdg b-ais">AIS</span> broadcast live</span><span><span class="bdg b-mid">MMSI</span> from the number</span><span><span class="bdg b-crew">crew</span> typed, often stale</span></div>';
    el.querySelector(".dclose").onclick=function(){ sel=null; render(); };
  }
  function row(k,v){ return '<div class="row"><span class="lab">'+k+'</span><span class="val">'+v+'</span></div>'; }
  function select(mmsi){ sel=mmsi; render(); }

  /* ---------- status / banner ---------- */
  function setStatus(tot){
    var box=document.getElementById("status"), t=document.getElementById("stext");
    box.className="status"+(demo?" demo":(live?" live":" err"));
    if(demo) t.textContent="Demo data · "+tot+" ships";
    else if(live) t.textContent="Live · "+tot+" ships";
    else t.textContent="Connecting…";
  }
  function banner(html){ var b=document.getElementById("banner"); if(html){b.innerHTML=html;b.classList.add("show");} else b.classList.remove("show"); }

  /* ---------- ingest ---------- */
  function upsert(mmsi, patch){
    var v=vessels.get(mmsi);
    if(!v){ v={mmsi:mmsi, name:null, len:null, beam:null, sog:null, course:null, heading:null, nav:15, dest:null, imo:null, cs:null, draught:null, eta:null, lat:null, lon:null, bearing:null, range:null, cat:"Vessel", glyph:"small", t:Date.now(), demo:false}; vessels.set(mmsi,v); }
    Object.assign(v, patch); v.t=Date.now();
    if(v.lat!=null && v.lon!=null){ var g=geo(v.lat,v.lon); v.range=g.range; v.bearing=g.bearing; }
    return v;
  }
  function handle(msg){
    var mmsi = msg && msg.MetaData && msg.MetaData.MMSI; if(!mmsi) return;
    msgs++; if(!live){ live=true; demo=false; banner(""); }
    if(msg.MessageType==="PositionReport"){
      var p=msg.Message.PositionReport, nm=(msg.MetaData.ShipName||"").trim();
      upsert(mmsi, {lat:p.Latitude, lon:p.Longitude, sog:(typeof p.Sog==="number"?p.Sog:null),
        course:(typeof p.Cog==="number"?p.Cog:null), heading:(p.TrueHeading!=null && p.TrueHeading<360?p.TrueHeading:null),
        nav:p.NavigationalStatus, name: nm||undefined});
    } else if(msg.MessageType==="ShipStaticData"){
      var s=msg.Message.ShipStaticData, dim=s.Dimension||{}, len=(dim.A!=null&&dim.B!=null)?(dim.A+dim.B):null, beam=(dim.C!=null&&dim.D!=null)?(dim.C+dim.D):null;
      var ti=typeInfo(s.Type, len);
      upsert(mmsi, {name:(s.Name||"").trim()||undefined, len:len, beam:beam, dest:(s.Destination||"").trim()||null,
        imo:(s.ImoNumber||null), cs:(s.CallSign||"").trim()||null,
        draught:(typeof s.MaximumStaticDraught==="number"&&s.MaximumStaticDraught>0?s.MaximumStaticDraught:null), eta:formatEta(s.Eta),
        cat:ti.label, glyph:ti.glyph});
    }
  }
  function applyVessel(v){
    if(v.lat==null || v.lon==null) return;
    var ti=typeInfo(v.type, v.len);
    var rec=upsert(v.mmsi, {lat:v.lat, lon:v.lon, sog:v.sog, course:v.course, heading:v.heading, nav:v.nav,
      name:v.name||undefined, len:v.len, beam:v.beam, dest:v.dest||null, imo:v.imo||null, cs:v.cs||null,
      draught:v.draught||null, eta:v.eta||null, cat:ti.label, glyph:ti.glyph});
    if(v.ageMs!=null) rec.t=Date.now()-v.ageMs;
  }

  /* ---------- connection ---------- */
  var ws, tries=0;
  function connect(){
    try{ ws=new WebSocket(ENDPOINT); }catch(e){ fail(); return; }
    ws.onopen=function(){ tries=0; ws.send(JSON.stringify({APIKey:API_KEY, BoundingBoxes:BBOX, FilterMessageTypes:["PositionReport","ShipStaticData"]})); };
    ws.onmessage=function(ev){ try{ handle(JSON.parse(ev.data)); }catch(e){} };
    ws.onclose=function(){ if(!live && tries>=3){ fail(); } else { tries++; setTimeout(connect, 3000); } };
    ws.onerror=function(){ try{ws.close();}catch(e){} };
  }
  function poll(){
    fetch(POLL_URL, {cache:"no-store"})
      .then(function(r){ if(!r.ok) throw new Error("http "+r.status); return r.json(); })
      .then(function(d){
        if(!live){ live=true; demo=false; banner(""); }
        if(d && d.vessels) d.vessels.forEach(applyVessel);
        setTimeout(poll, POLL_MS);
      })
      .catch(function(){ if(!live) fail(); else setTimeout(poll, POLL_MS); });
  }
  function fail(){
    if(live) return;
    if(!demo){
      demo=true; loadDemo();
      var note = MODE==="proxy"
        ? "Couldn’t reach the local proxy — make sure <b>harborview-proxy.js</b> is running on port 8080."
        : "Couldn’t reach the live feed (<b>/api/ships</b>). Showing demo ships.";
      banner("<div><b>Demo data.</b> "+note+"</div>");
    }
  }

  /* ---------- demo ---------- */
  function loadDemo(){
    var D=[
      {mmsi:636019000,name:"MSC Bremen",code:70,len:366,beam:51,sog:14.2,course:58,heading:58,nav:0,dest:"BOSTON CONLEY",imo:9839430,cs:"D5XX2",b:42,r:3.1},
      {mmsi:338210000,name:"Seabulk Trader",code:80,len:183,beam:32,sog:9.6,course:241,heading:241,nav:0,dest:"NEW YORK",imo:9412300,cs:"WDXX",b:71,r:1.8},
      {mmsi:367010000,name:"Provincetown II",code:60,len:49,beam:12,sog:22.0,course:130,heading:130,nav:0,dest:"PROVINCETOWN",imo:null,cs:"WDXY",b:18,r:0.9},
      {mmsi:311042000,name:"Aurora Seas",code:69,len:252,beam:32,sog:0.0,course:null,heading:null,nav:5,dest:"BOSTON BLACK FALCON",imo:9601230,cs:"C6XX",b:88,r:2.4},
      {mmsi:366998000,name:"Harbor Guardian",code:52,len:32,beam:11,sog:6.1,course:305,heading:305,nav:0,dest:"",imo:null,cs:"WDXZ",b:55,r:1.2},
      {mmsi:367445000,name:"Pilot Boston",code:50,len:16,beam:5,sog:18.0,course:90,heading:90,nav:0,dest:"PILOT STN",imo:null,cs:"WAXX",b:100,r:4.0},
      {mmsi:354020000,name:"Bay Stater",code:79,len:199,beam:28,sog:11.4,course:262,heading:262,nav:0,dest:"BOSTON MORAN",imo:9388210,cs:"3FXX",b:122,r:5.2},
      {mmsi:538008000,name:"Mystic Runner",code:70,len:229,beam:32,sog:7.3,course:15,heading:15,nav:0,dest:"BOSTON MYSTIC",imo:9511200,cs:"V7XX",b:5,r:4.6}
    ];
    D.forEach(function(d){
      var pt=destPoint(d.b,d.r), ti=typeInfo(d.code,d.len);
      var v={mmsi:d.mmsi,name:d.name,len:d.len,beam:d.beam,sog:d.sog,course:d.course,heading:d.heading,nav:d.nav,dest:d.dest||null,imo:d.imo,cs:d.cs,lat:pt.lat,lon:pt.lon,cat:ti.label,glyph:ti.glyph,t:Date.now(),demo:true};
      var g=geo(v.lat,v.lon); v.bearing=g.bearing; v.range=g.range; v._br=(Math.random()-0.5)*1.3; v._rr=(Math.random()-0.5)*0.05;
      vessels.set(d.mmsi,v);
    });
  }
  setInterval(function(){
    if(!demo) return;
    vessels.forEach(function(v){
      if(!v.demo || v.nav===5) return;
      v.bearing+=v._br; if(v.bearing<2){v.bearing=2;v._br*=-1;} if(v.bearing>178){v.bearing=178;v._br*=-1;}
      v.range+=v._rr; if(v.range<0.6){v.range=0.6;v._rr*=-1;} if(v.range>6){v.range=6;v._rr*=-1;}
      var pt=destPoint(v.bearing,v.range); v.lat=pt.lat; v.lon=pt.lon;
      v.course=(v.heading=v.bearing); // demo: point roughly outward
    });
  },1200);

  /* ---------- go ---------- */
  initMap();
  if(MODE==="proxy") connect(); else poll();
  setTimeout(function(){ if(!live) fail(); }, 8000);
  setInterval(render, 1000);
})();
</script>
</body>
</html>
